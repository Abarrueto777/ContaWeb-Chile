[build]
builder = "nixpacks"

[deploy]
startCommand = "cd apps/api && npx prisma migrate deploy && node dist/index.js"
# Si migrate deploy falla, usar: npx prisma db push && node dist/index.js
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
