services:
  postgres:
    image: postgres:16-alpine
    container_name: contaweb_db
    environment:
      POSTGRES_USER: contaweb
      POSTGRES_PASSWORD: contaweb_dev
      POSTGRES_DB: contaweb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
