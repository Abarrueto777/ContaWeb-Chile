[phases.build]
cmds = [
  "pnpm --filter @contaweb/shared-types build",
  "pnpm --filter @contaweb/validations build",
  "DATABASE_URL='postgresql://x:x@localhost/x' pnpm --filter @contaweb/api build",
  "VITE_API_URL='' pnpm --filter @contaweb/web build"
]

[start]
cmd = "node apps/api/dist/index.js"
