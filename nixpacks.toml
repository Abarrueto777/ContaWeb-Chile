[variables]
# DATABASE_URL ficticio para que prisma generate compile sin error.
# Railway reemplaza esto con el valor real en runtime.
DATABASE_URL = "postgresql://dummy:dummy@localhost:5432/dummy"

[phases.build]
cmds = [
  "pnpm --filter @contaweb/shared-types build",
  "pnpm --filter @contaweb/validations build",
  "pnpm --filter @contaweb/api build",
  "VITE_API_URL='' pnpm --filter @contaweb/web build"
]

[start]
cmd = "cd apps/api && npx prisma migrate deploy && node dist/index.js"
